{% extends "base.html" %}
{% block content %}
<div class="card shadow"><div class="card-header bg-primary text-white"><h4>Add Program</h4></div><div class="card-body">
<form method="POST">
  <div class="mb-3"><label>Program Name</label><input type="text" name="program_name" class="form-control" required></div>
  <div class="mb-3"><label>Program Code</label><input type="text" name="program_code" class="form-control" required></div>
  <div class="mb-3"><label>Duration</label><input type="text" name="duration" class="form-control" placeholder="Example: 6 months"></div>
  <div class="mb-3"><label>Fee</label><input type="number" step="0.01" name="fee" class="form-control"></div>
  <div class="mb-3"><label>Description</label><textarea name="description" class="form-control"></textarea></div>
  <button class="btn btn-primary">Save Program</button> <a href="/program-management" class="btn btn-secondary">Back</a>
</form></div></div>
{% endblock %}
