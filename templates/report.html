{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">System Report</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow text-center mb-3">
            <div class="card-body">
                <h5>Total Employees</h5>
                <h1>{{ total_employees }}</h1>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center mb-3">
            <div class="card-body">
                <h5>Total Leaves</h5>
                <h1>{{ total_leaves }}</h1>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center mb-3">
            <div class="card-body">
                <h5>Pending Leaves</h5>
                <h1>{{ pending_leaves }}</h1>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow text-center mb-3">
            <div class="card-body">
                <h5>Approved Leaves</h5>
                <h1>{{ approved_leaves }}</h1>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow text-center mb-3">
            <div class="card-body">
                <h5>Rejected Leaves</h5>
                <h1>{{ rejected_leaves }}</h1>
            </div>
        </div>
    </div>
</div>
{% endblock %}
