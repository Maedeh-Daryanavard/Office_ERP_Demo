{% extends "base.html" %}
{% block content %}
<div class="card shadow"><div class="card-header bg-warning"><h4>Edit Program</h4></div><div class="card-body">
<form method="POST">
  <div class="mb-3"><label>Program Name</label><input type="text" name="program_name" class="form-control" value="{{ program.program_name }}" required></div>
  <div class="mb-3"><label>Program Code</label><input type="text" name="program_code" class="form-control" value="{{ program.program_code }}" required></div>
  <div class="mb-3"><label>Duration</label><input type="text" name="duration" class="form-control" value="{{ program.duration }}"></div>
  <div class="mb-3"><label>Fee</label><input type="number" step="0.01" name="fee" class="form-control" value="{{ program.fee }}"></div>
  <div class="mb-3"><label>Description</label><textarea name="description" class="form-control">{{ program.description }}</textarea></div>
  <button class="btn btn-warning">Update Program</button> <a href="/programs" class="btn btn-secondary">Back</a>
</form></div></div>
{% endblock %}
